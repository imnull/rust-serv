# Rust Static Server Configuration Example - HTTPS/TLS

# Server port for HTTPS (default: 443 for HTTPS)
port = 443

# Root directory for serving files (default: ".")
root = "./public"

# Enable directory indexing (default: true)
# When true, shows file listing for directories without index.html
enable_indexing = true

# Enable compression (default: true)
# When true, compresses responses with gzip/brotli
enable_compression = true

# Enable HTTPS/TLS (default: false)
# When true, server will use HTTPS instead of HTTP
enable_tls = true

# TLS certificate file path (required when enable_tls is true)
# This should point to your SSL/TLS certificate file
# For production, use certificates from Let's Encrypt or other trusted CA
tls_cert = "./cert.pem"

# TLS private key file path (required when enable_tls is true)
# This should point to your SSL/TLS private key file
tls_key = "./key.pem"

# Log level (default: "info")
# Options: "error", "warn", "info", "debug", "trace"
log_level = "info"

# Connection timeout in seconds (default: 30)
connection_timeout_secs = 30

# Max concurrent connections (default: 1000)
max_connections = 1000

# Enable health check endpoint (default: true)
enable_health_check = true
