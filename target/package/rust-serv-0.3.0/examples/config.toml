# Rust Static Server Configuration Example

# Server port (default: 8080)
port = 8080

# Root directory for serving files (default: ".")
root = "./public"

# Enable directory indexing (default: true)
# When true, shows file listing for directories without index.html
enable_indexing = true

# Enable compression (default: true)
# When true, compresses responses with gzip/brotli
enable_compression = true

# Log level (default: "info")
# Options: "error", "warn", "info", "debug", "trace"
log_level = "info"
